<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070b12" />
    <title>Starting InfinityAI</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #070b12;
        color: #e6f7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 15%, rgba(31, 147, 160, 0.2), transparent 34%),
          radial-gradient(circle at 85% 85%, rgba(56, 189, 248, 0.12), transparent 30%),
          #070b12;
      }

      .card {
        width: min(90vw, 560px);
        padding: 48px 36px;
        text-align: center;
        border: 1px solid rgba(56, 189, 248, 0.22);
        border-radius: 24px;
        background: rgba(13, 20, 32, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(16px);
      }

      .spinner {
        width: 52px;
        height: 52px;
        margin: 0 auto 24px;
        border: 5px solid rgba(56, 189, 248, 0.16);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      h1 {
        margin: 0 0 12px;
        color: #38bdf8;
        font-size: clamp(2rem, 7vw, 3rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 8px 0;
        color: #a8bed0;
        line-height: 1.55;
      }

      #status {
        color: #e6f7ff;
        font-weight: 650;
      }

      .retry-note {
        margin-top: 24px;
        font-size: 0.88rem;
        color: #7890a5;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation-duration: 2s;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <h1>InfinityAI</h1>
      <p id="status">Preparing your AI workspace…</p>
      <p>The free server may need up to one minute to wake up.</p>
      <p class="retry-note" id="retry-note">Checking the server now.</p>
      <noscript>
        <p>
          JavaScript is required for automatic startup.
          <a href="https://infinityai-app.onrender.com">Open InfinityAI directly.</a>
        </p>
      </noscript>
    </main>

    <script>
      const appUrl = "https://infinityai-app.onrender.com";
      const statusElement = document.getElementById("status");
      const retryElement = document.getElementById("retry-note");
      let checkCount = 0;

      async function checkApp() {
        checkCount += 1;

        try {
          const response = await fetch(`/api/health?time=${Date.now()}`, {
            cache: "no-store",
          });

          if (response.ok) {
            statusElement.textContent = "InfinityAI is ready. Opening now…";
            retryElement.textContent = "Connected successfully.";
            window.setTimeout(() => window.location.replace(appUrl), 700);
            return;
          }
        } catch (error) {
          // A failed check is expected while the Render service is waking up.
        }

        statusElement.textContent = "The server is waking up…";
        retryElement.textContent = `Connection check ${checkCount}. Trying again automatically.`;
        window.setTimeout(checkApp, 3000);
      }

      checkApp();
    </script>
  </body>
</html>
